repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: "poetry.lock|uv.lock|.*/test_.*\\.py|.*/test_.*\\.json"
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: [".[toml]"]
  - repo: local
    hooks:
      - id: cognitive-complexity
        name: cognitive complexity check (≤15, matches PyCharm)
        entry: .venv/bin/python scripts/check-cognitive-complexity.py
        language: system
        types: [python]
        pass_filenames: false
        stages: [commit]
      - id: lizard-cyclomatic-complexity
        name: lizard cyclomatic complexity check (CCN <= 20)
        entry: sh -c '.venv/bin/python -m lizard --languages python -C 20 -w ai_calls_router'
        language: system
        types: [python]
        pass_filenames: false
        stages: [commit]
  # flake8/wemake removed — cognitive complexity via Ruff C901 (mccabe)
  # docstring-outdated detection via Ruff D417 (pydocstyle: args-match-signature)
