[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-calls-router"
version = "0.1.0"
description = "Per-tool-result model routing proxy for Claude Code: serve cheap tool-result turns on any LiteLLM-supported model, keep decision turns on Anthropic."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "Mahesh Kokare" }]
keywords = ["claude-code", "proxy", "llm-routing", "litellm", "cost-optimization"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "litellm>=1.70",
    "pyyaml>=6.0",
    "httpx>=0.27",
    "starlette>=0.40",
    "uvicorn>=0.30",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "ruff>=0.6",
    "build>=1.2",
]

[project.scripts]
acr = "ai_calls_router.cli:main"

[project.urls]
Homepage = "https://github.com/maheshkokare/ai-calls-router"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_calls_router"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.coverage.run]
source = ["src/ai_calls_router"]
