# ai-calls-router example configuration.
#
# Copy to ~/.ai-calls-router/config.yaml (or run `acr init` to generate one
# interactively) and edit. The proxy hot-reloads this file on every request by
# mtime, so edits take effect without a restart.
#
# Routing model: each pending tool-result turn is served on the tier mapped to
# the tool that produced it. Decision-making turns (no pending tool results)
# and any tool mapped to "premium" pass straight through to the agent group's
# own upstream with the client's OAuth/api-key untouched. Any failure falls
# back to passthrough.

server:
  host: 127.0.0.1
  port: 8747
  upstream: https://api.anthropic.com   # premium passthrough target

# v1 supports the Anthropic passthrough only. The block is reserved so future
# versions can add user-selectable premium providers without a schema break;
# any provider other than "anthropic" is rejected at startup today.
premium:
  provider: anthropic

settings:
  # Optional KEY=VALUE fallback for tier API keys not present in the process
  # environment. Process environment variables always win. Tilde-expanded.
  env_file: ~/.ai-calls-router/.env

  # Highest-to-lowest tier ranking. When one turn carries tool results from
  # several tiers, the highest-ranked tier serves it; "premium" always wins
  # and forces passthrough.
  tier_precedence: [premium, structured, code, fast, crud]

  escalate_on_premium_tools: true   # false disables the guard (routed responses are served as-is)

  # Run routed messages through headroom on the LiteLLM (non-direct) path only.
  # Compression applies to the OpenAI-format messages after conversion and
  # respects headroom's defaults, so coding-agent tool output (Read/Edit/Bash)
  # is left verbatim; non-coding-agent tool output (the OpenAI providers this
  # router will serve) is shrunk. The DeepSeek direct path is never compressed
  # (it must keep byte-identical prefixes for the provider cache). Requires the
  # "compression" extra (`pip install ai-calls-router[compression]`); a no-op
  # when headroom-ai is not installed. Default: true.
  compress_routed: true

# Agent-local serving tiers. `tools` maps each agent's tool vocabulary to a
# semantic tier name; `agents.<group>.tiers.<tier>` decides the actual model for
# that agent. This lets Claude Code `fast` route to DeepSeek while Hermes `fast`
# routes to a GPT model, without inventing names like `claude_fast`.
#
# Auth:
#   auth.mode: api_key_env uses auth.key_env from process env or settings.env_file.
#
# effort (optional, per tier): reasoning level forced on this tier's routed
#   turns -- one of low | medium | high | max. Each tier decides independently,
#   so a cheap tier can run low while another runs high. "xhigh" is rejected
#   because only premium Opus accepts it (a routed Sonnet turn returns HTTP 400).
#   Premium passthrough is never routed and keeps its own level (set in the
#   client), so there is nothing to sync. Omit to leave the client's level
#   as-is, downgrading only the Opus-only xhigh to high as a safety net. Only
#   Anthropic routed models read effort; DeepSeek/OpenAI tiers ignore it.
#
# text_ml_compression (optional, per tier): set true to also run headroom's
#   lossy ML plain-text compressor (Kompress) on this tier's tool-output text.
#   Off by default -- the lossless compressors (JSON tables, code, diffs, logs)
#   always run, so this only adds prose-token shrinking. Requires the ML extra
#   (`pip install ai-calls-router[compression-ml]`); without it the flag is a
#   silent no-op. Leave false for tiers serving coding agents, where dropping
#   prose tokens from tool output can corrupt the model's context.
agents:
  claude_code:
    upstream: https://api.anthropic.com
    tools:
      Bash: fast
      BashOutput: fast
      KillShell: fast
      WebFetch: fast
      WebSearch: fast
      Read: code
      Grep: code
      Glob: code
      LSP: code
      TodoWrite: crud
      TaskList: crud
      TaskGet: crud
      Edit: premium
      Write: premium
      MultiEdit: premium
      NotebookEdit: premium
      Task: premium
      ExitPlanMode: premium
      AskUserQuestion: premium
    premium_tools: [Edit, Write, MultiEdit, NotebookEdit, Task, ExitPlanMode, AskUserQuestion]
    tiers:
      fast:
        provider: deepseek
        model: deepseek/deepseek-v4-flash
        auth:
          mode: api_key_env
          key_env: DEEPSEEK_API_KEY
        max_tokens: 8192
        input_cost_per_1m: 0.14
        input_cached_cost_per_1m: 0.0028
        output_cost_per_1m: 0.28
      code:
        provider: deepseek
        model: deepseek/deepseek-v4-pro
        auth:
          mode: api_key_env
          key_env: DEEPSEEK_API_KEY
        max_tokens: 8192
        input_cost_per_1m: 0.435
        input_cached_cost_per_1m: 0.003625
        output_cost_per_1m: 0.87
      crud:
        provider: deepseek
        model: deepseek/deepseek-v4-flash
        auth:
          mode: api_key_env
          key_env: DEEPSEEK_API_KEY
        max_tokens: 4096
        input_cost_per_1m: 0.14
        input_cached_cost_per_1m: 0.0028
        output_cost_per_1m: 0.28
      structured:
        provider: deepseek
        model: deepseek/deepseek-v4-flash
        auth:
          mode: api_key_env
          key_env: DEEPSEEK_API_KEY
        max_tokens: 8192
        input_cost_per_1m: 0.14
        input_cached_cost_per_1m: 0.0028
        output_cost_per_1m: 0.28

  hermes:
    upstream: https://api.openai.com
    tools:
      terminal: fast
      process: fast
      read_file: code
      search_files: code
      execute_code: code
      skill_view: code
      todo: crud
      memory: crud
      session_search: crud
      skills_list: crud
      write_file: structured
      skill_manage: structured
      cronjob: structured
      patch: premium
      clarify: premium
      delegate_task: premium
      browser_vision: premium
      browser_*: premium
    premium_tools: [patch, clarify, delegate_task]
    tiers:
      fast:
        provider: openai
        model: gpt-4.1-mini
        auth:
          mode: api_key_env
          key_env: OPENAI_API_KEY
        max_tokens: 8192
      code:
        provider: openai
        model: gpt-4.1
        auth:
          mode: api_key_env
          key_env: OPENAI_API_KEY
        max_tokens: 8192
      crud:
        provider: openai
        model: gpt-4.1-mini
        auth:
          mode: api_key_env
          key_env: OPENAI_API_KEY
        max_tokens: 4096
      structured:
        provider: openai
        model: gpt-4.1
        auth:
          mode: api_key_env
          key_env: OPENAI_API_KEY
        max_tokens: 8192

# Agent identity routing. `x-acr-agent` wins, then user-agent contains rules,
# then endpoint defaults, then fallback. `fallback: null` deliberately fails
# closed with 400 when identity cannot be resolved.
router:
  endpoint_defaults:
    /v1/messages: claude_code
    /v1/chat/completions: hermes
  user_agent_map:
    - contains: claude
      group: claude_code
    - contains: hermes
      group: hermes
  fallback: null

# Per-provider config may also live in separate files under
# ~/.ai-calls-router/config/{claude-code,hermes}.yaml. `acr init` and
# server startup create missing files without overwriting edits.
#
# Runtime-consumed provider fields:
#   upstream       Passthrough target for that agent group's non-routed turns.
#   tools          Tool -> tier map.
#   premium_tools  Tools that force passthrough after response synthesis.
#
# Reserved/validated provider fields:
#   auth, wire, endpoints, model_defaults, tool_choice, reasoning, fallback.
#   The router validates wire/endpoints but still selects adapters from the
#   request path and identity rules above.
