# ai-calls-router example configuration.
#
# Copy to ~/.ai-calls-router/config.yaml (or run `acr init` to generate one
# interactively) and edit. The proxy hot-reloads this file on every request by
# mtime, so edits take effect without a restart.
#
# Routing model: each pending tool-result turn is served on the tier mapped to
# the tool that produced it. Decision-making turns (no pending tool results)
# and any tool mapped to "premium" pass straight through to the agent group's
# own upstream with the client's OAuth/api-key untouched. Any failure falls
# back to passthrough.

server:
  host: 127.0.0.1
  port: 8747
  upstream: https://api.anthropic.com   # premium passthrough target

# v1 supports the Anthropic passthrough only. The block is reserved so future
# versions can add user-selectable premium providers without a schema break;
# any provider other than "anthropic" is rejected at startup today.
premium:
  provider: anthropic

settings:
  # Optional KEY=VALUE fallback for tier API keys not present in the process
  # environment. Process environment variables always win. Tilde-expanded.
  env_file: ~/.ai-calls-router/.env

  # Highest-to-lowest tier ranking. When one turn carries tool results from
  # several tiers, the highest-ranked tier serves it; "premium" always wins
  # and forces passthrough.
  tier_precedence: [premium, structured, code, fast, crud]

  escalate_on_premium_tools: true   # false disables the guard (routed responses are served as-is)

  # Run routed messages through headroom on the LiteLLM (non-direct) path only.
  # Compression applies to the OpenAI-format messages after conversion and
  # respects headroom's defaults, so coding-agent tool output (Read/Edit/Bash)
  # is left verbatim; non-coding-agent tool output (the OpenAI providers this
  # router will serve) is shrunk. The DeepSeek direct path is never compressed
  # (it must keep byte-identical prefixes for the provider cache). Requires the
  # "compression" extra (`pip install ai-calls-router[compression]`); a no-op
  # when headroom-ai is not installed. Default: true.
  compress_routed: true

# Cheap serving tiers. `model` is any LiteLLM-supported id; `key_env` names the
# environment variable holding that provider's API key (never the Anthropic
# credential). `max_tokens` caps the routed completion.
#
# input_cost_per_1m / output_cost_per_1m are price overrides in USD per one
# million tokens; input_cached_cost_per_1m is the cheaper rate a provider bills
# for prompt tokens served from its prefix cache. Supply prices when LiteLLM
# does not already price the model (the `acr savings` ledger uses LiteLLM's own
# table first). The DeepSeek tiers below route through DeepSeek's native
# Anthropic endpoint -- bypassing LiteLLM entirely so consecutive turns keep
# byte-identical prefixes for the provider's cache -- so their ids are not in
# LiteLLM's table and the ledger depends on these overrides: cache hits bill at
# input_cached_cost_per_1m, misses at input_cost_per_1m. The values are
# PLACEHOLDERS -- verify against each provider's published rates before trusting
# the savings report. An unpriced model is never guessed at: it is simply
# omitted from the ledger.
tiers:
  fast:
    model: deepseek/deepseek-v4-flash
    key_env: DEEPSEEK_API_KEY
    max_tokens: 8192
    input_cost_per_1m: 0.14            # cache miss -- placeholder, verify
    input_cached_cost_per_1m: 0.0028   # cache hit  -- placeholder, verify
    output_cost_per_1m: 0.28           # placeholder, verify
  structured:
    model: deepseek/deepseek-v4-flash
    key_env: DEEPSEEK_API_KEY
    max_tokens: 8192
    input_cost_per_1m: 0.14            # cache miss -- placeholder, verify
    input_cached_cost_per_1m: 0.0028   # cache hit  -- placeholder, verify
    output_cost_per_1m: 0.28           # placeholder, verify
  code:
    model: deepseek/deepseek-v4-pro
    key_env: DEEPSEEK_API_KEY
    max_tokens: 8192
    input_cost_per_1m: 0.435           # cache miss -- placeholder, verify
    input_cached_cost_per_1m: 0.003625 # cache hit  -- placeholder, verify
    output_cost_per_1m: 0.87           # placeholder, verify
  crud:
    model: deepseek/deepseek-v4-flash
    key_env: DEEPSEEK_API_KEY
    max_tokens: 4096
    input_cost_per_1m: 0.14            # cache miss -- placeholder, verify
    input_cached_cost_per_1m: 0.0028   # cache hit  -- placeholder, verify
    output_cost_per_1m: 0.28           # placeholder, verify

# Agent identity routing. `x-acr-agent` wins, then user-agent contains rules,
# then endpoint defaults, then fallback. `fallback: null` deliberately fails
# closed with 400 when identity cannot be resolved.
router:
  endpoint_defaults:
    /v1/messages: claude_code
    /v1/chat/completions: hermes
    /v1/responses: codex
  user_agent_map:
    - contains: claude
      group: claude_code
    - contains: hermes
      group: hermes
    - contains: codex
      group: codex
  fallback: null

# Per-provider config now lives in separate files under
# ~/.ai-calls-router/config/{claude-code,codex,hermes}.yaml. `acr init` and
# server startup create missing files without overwriting edits.
#
# Runtime-consumed provider fields:
#   upstream       Passthrough target for that agent group's non-routed turns.
#   tools          Tool -> tier map.
#   premium_tools  Tools that force passthrough after response synthesis.
#
# Reserved/validated provider fields:
#   auth, wire, endpoints, model_defaults, tool_choice, reasoning, fallback.
#   The router validates wire/endpoints but still selects adapters from the
#   request path and identity rules above.
