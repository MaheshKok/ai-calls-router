name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & format (fast, runs first) ──────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv pip install -e ".[dev,compression]"
      - run: uv run ruff check ai_calls_router tests
      - run: uv run ruff format --check ai_calls_router tests

  # ── Type checking ─────────────────────────────────────────────────
  type:
    name: Type check (pyrefly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv pip install -e ".[dev,compression]"
      - run: uv run pyrefly check ai_calls_router

  # ── Tests (matrix across Python versions) ─────────────────────────
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install -e ".[dev,compression]"
      - run: uv run pytest -q --cov --cov-report=term-missing --cov-fail-under=95

  # ── Security (SAST + dependency audit) ────────────────────────────
  security:
    name: Security (Bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv pip install -e ".[dev,compression]"
      - run: uv run bandit -r ai_calls_router -c pyproject.toml
      - run: uv run pip-audit

  # ── Dependency hygiene ────────────────────────────────────────────
  deps:
    name: Dependencies (deptry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv pip install -e ".[dev,compression]"
      - run: uv run deptry ai_calls_router

  # ── Complexity gate ───────────────────────────────────────────────
  complexity:
    name: Complexity (Radon + Xenon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv pip install radon xenon
      - run: uv run radon cc ai_calls_router tests -s -a --total-average
      - run: uv run radon mi ai_calls_router -s
      - run: uv run xenon --max-absolute D --max-modules C --max-average A ai_calls_router

  # ── Build + package validation ────────────────────────────────────
  build:
    name: Build + Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv pip install build twine check-wheel-contents
      - run: uv run python -m build
      - run: uv run twine check dist/*
      - run: uv run check-wheel-contents dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Advisory tools (non-blocking, report only) ────────────────────
  advisory:
    name: Advisory (vulture, refurb, interrogate, semgrep)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv pip install vulture refurb interrogate semgrep
      - run: uv run vulture ai_calls_router --min-confidence 80 || true
      - run: uv run refurb ai_calls_router || true
      - run: uv run interrogate ai_calls_router || true
      - run: uv run semgrep --config auto ai_calls_router || true
